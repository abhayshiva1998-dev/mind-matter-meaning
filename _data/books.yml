physics:
  - title: The Character of Physical Law
    author: Richard P. Feynman
    summary: A lucid introduction to conservation laws, symmetry, probability, and the style of physical explanation.
    difficulty: Beginner
    recommended_for: Readers entering theoretical physics through clear conceptual lectures.
  - title: The Road to Reality
    author: Roger Penrose
    summary: A broad mathematical tour of modern physics from geometry to quantum theory.
    difficulty: Advanced
    recommended_for: Readers comfortable with sustained mathematical argument.
mathematics:
  - title: Mathematics and Its History
    author: John Stillwell
    summary: A historical route through mathematical ideas that keeps proof and context together.
    difficulty: Intermediate
    recommended_for: Students who want structure behind mathematical development.
philosophy:
  - title: Problems of Philosophy
    author: Bertrand Russell
    summary: A compact entry into knowledge, perception, universals, and philosophical method.
    difficulty: Beginner
    recommended_for: New readers of analytic philosophy.
  - title: "Philosophy: Who Needs It"
    author: Ayn Rand
    category: Philosophy
    summary: A collection of essays on the practical role of philosophical ideas in reason, values, judgment, and human life.
    difficulty: Intermediate
    recommended_for: Readers interested in rationality, epistemology, ethics, and the role of philosophy in life.
  - title: Introduction to Objectivist Epistemology
    author: Ayn Rand
    category: Philosophy / Epistemology
    summary: A technical discussion of concept formation, abstraction, definitions, and the theory of knowledge in Objectivist philosophy.
    difficulty: Advanced
    recommended_for: Readers interested in concepts, abstraction, knowledge, and Objectivist epistemology.
  - title: The Awakening of Intelligence
    author: J. Krishnamurti
    category: Philosophy / Consciousness
    summary: Dialogues and reflections on attention, conditioning, self-knowledge, intelligence, and the possibility of inner freedom.
    difficulty: Intermediate
    recommended_for: Readers interested in self-inquiry, intelligence, attention, conditioning, and freedom.
indian_philosophy:
  - title: Jnana Yoga
    author: Swami Vivekananda
    category: Indian Philosophy
    summary: A philosophical exposition of the path of knowledge in Vedanta, focused on self-inquiry, reason, and realization.
    difficulty: Intermediate
    recommended_for: Readers interested in knowledge, Vedanta, self-inquiry, and the philosophical path to realization.
  - title: Bhakti Yoga
    author: Swami Vivekananda
    category: Indian Philosophy
    summary: A study of devotion, love, spiritual discipline, and the emotional dimension of religious life in Indian thought.
    difficulty: Beginner to Intermediate
    recommended_for: Readers interested in devotion, love, spiritual practice, and Indian philosophical traditions.
  - title: Religion of Love
    author: Swami Vivekananda
    category: Indian Philosophy / Spiritual Philosophy
    summary: Reflections on love, devotion, religion, ethics, and spiritual humanism in a concise and accessible form.
    difficulty: Beginner
    recommended_for: Readers interested in love, devotion, religion, ethics, and spiritual humanism.
literature:
  - title: Mimesis
    author: Erich Auerbach
    summary: A landmark study of realism and representation in Western literature.
    difficulty: Advanced
    recommended_for: Readers interested in form, history, and interpretation.
artificial_intelligence:
  - title: Artificial Intelligence
    author: Stuart Russell and Peter Norvig
    summary: A standard technical introduction to search, reasoning, learning, and intelligent agents.
    difficulty: Intermediate
    recommended_for: Students building a durable foundation in AI.
history:
  - title: The Structure of Scientific Revolutions
    author: Thomas S. Kuhn
    summary: A major account of paradigms, normal science, and conceptual change.
    difficulty: Intermediate
    recommended_for: Readers studying scientific change and method.
psychology:
  - title: Thinking, Fast and Slow
    author: Daniel Kahneman
    summary: A survey of judgment, bias, and decision-making from cognitive psychology.
    difficulty: Beginner
    recommended_for: Readers connecting psychology with critical thinking.
